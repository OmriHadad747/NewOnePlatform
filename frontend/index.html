<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Shlomi — your AI project manager" />
    <title>Shlomi · AI Project Manager</title>
    <script>
      // Apply the saved/preferred theme before first paint to avoid a flash of
      // the wrong theme. theme.tsx remains the source of truth after mount.
      (function () {
        try {
          var t = localStorage.getItem('aipm.theme')
          if (t !== 'light' && t !== 'dark') {
            t = window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light'
          }
          document.documentElement.classList.toggle('dark', t === 'dark')
          document.documentElement.style.colorScheme = t
        } catch (e) {}
      })()
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
